services:
  db:
    image: postgres:17
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    env_file: .env
    environment:
      # Override host-based URLs so the container talks to services by name.
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      AGENT_URL: http://agent:8000
    volumes:
      # Bind only apps/api; hoisted node_modules stays at /app/node_modules (outside this mount).
      - ./apps/api:/app/apps/api
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(3000,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 20

  agent:
    build:
      context: ./apps/agent
      dockerfile: Dockerfile.dev
    env_file: .env
    volumes:
      - ./apps/agent:/app
      - /app/.venv          # anonymous volume: keep the image's venv, don't let the mount clobber it
    shm_size: "2gb"          # Chromium crashes on the default tiny /dev/shm
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 60s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  pgdata:
